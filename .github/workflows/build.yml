name: Build

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y nodejs npm libsdl2-2.0-0 libglib2.0-0 libpixman-1-0 zlib1g libsndio7.0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install pebble-tool
        run: uv tool install pebble-tool --python 3.13

      - name: Cache Pebble SDK
        uses: actions/cache@v4
        with:
          path: ~/.pebble-sdk
          key: pebble-sdk-latest

      - name: Install Pebble SDK
        run: echo y | pebble sdk install latest

      - name: Build
        run: pebble build
